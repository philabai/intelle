name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        # Dummy public env so the build resolves; no network/DB is hit (dynamic
        # pages aren't prerendered). Real secrets are never needed for CI build.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
          NEXT_PUBLIC_SITE_URL: https://intelle.io
        run: npm run build

  security:
    name: Dependencies · SAST · Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true # report, don't block (triage transitive DoS)
      - name: Semgrep (OWASP/JS/React/secrets)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten p/javascript p/react p/secrets
      - name: Gitleaks (committed-secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
